<div [ngClass]="{ scrolled: scrolled }" class="nav-bar">
  <a [routerLink]="p('/')" class="nav-logo" (click)="setActiveTab('home')">FareWell</a>

  <!-- Burger Icon -->
  <div
    class="burger"
    [ngClass]="{ open: menuOpen }"
    (click)="toggleMenu()"
    [attr.aria-label]="lang.t('Menü öffnen', 'Open menu')"
    role="button"
    tabindex="0"
  >
    <span></span>
    <span></span>
    <span></span>
  </div>

  <!-- Nav links -->
  <div class="nav-links-container" [ngClass]="{ open: menuOpen }">
    <a
      href="https://salonkee.de/salon/farewell?lang=de"
      target="_blank"
      rel="noopener noreferrer"
      class="nav-link"
      id="terminBuchen"
      (click)="trackBookingClick($event)"
    >
      <span class="lang de">Termin Buchen</span><span class="lang en">Book now</span>
    </a>

    <!-- Behandlungen -->
    <div class="nav-item behandlungen">
      <!-- Desktop: tight hover trigger -->
      <div
        class="behandlungen-trigger"
        (mouseenter)="onBehandlungenEnter()"
        (mouseleave)="onBehandlungenLeave()"
      >
        <button
          type="button"
          class="nav-link nav-link-btn"
          [class.active]="isBehandlungenRoute"
          [attr.aria-expanded]="behandlungenOpen"
          (click)="toggleBehandlungen($event)"
        >
          <span class="lang de">Behandlungen</span><span class="lang en">Treatments</span>
          <span class="chevron" [ngClass]="{ open: behandlungenOpen }">▾</span>
        </button>
      </div>

      <div class="behandlungen-mobile" [ngClass]="{ open: behandlungenOpen }">
        <div class="behandlungen-mobile-inner">
          <a
            class="behandlungen-mobile-link"
            *ngFor="let t of treatments"
            [routerLink]="t.route"
            (click)="setActiveTab('behandlungen')"
          >
            {{ t.title }}
          </a>
        </div>
      </div>
    </div>

    <!-- Sekundäre Links: auf Tablets im Burger-Menü, sonst Teil der Leiste -->
    <div class="nav-secondary">
      <a
        [routerLink]="p('/zeit')"
        routerLinkActive="active"
        (click)="setActiveTab('zeit')"
        class="nav-link"
      >
        <span class="lang de">Elektrolyse-Zeitberechnung</span><span class="lang en">Electrolysis time</span>
      </a>

      <a
        [routerLink]="p('/historie')"
        routerLinkActive="active"
        (click)="setActiveTab('historie')"
        class="nav-link"
      >
        <span class="lang de">Historie</span><span class="lang en">History</span>
      </a>

      <a
        [routerLink]="p('/price')"
        routerLinkActive="active"
        (click)="setActiveTab('price')"
        class="nav-link"
      >
        <span class="lang de">Preis</span><span class="lang en">Prices</span>
      </a>

      <a
        [routerLink]="p('/faq')"
        routerLinkActive="active"
        (click)="setActiveTab('faq')"
        class="nav-link"
      >
        FAQ
      </a>

      <!-- Sprachumschalter: letztes Element, auf Desktop rechts, auf Mobil unten -->
      <div class="nav-lang">
        <app-guide-lang-toggle
          [lang]="lang.lang()"
          (langChange)="lang.setLang($event)"
        />
      </div>
    </div>
  </div>

  <div
    class="behandlungen-panel"
    [ngClass]="{ open: behandlungenOpen }"
    (mouseenter)="onBehandlungenEnter()"
    (mouseleave)="onBehandlungenLeave()"
  >
    <div class="panel-inner">
      <a
        class="treatment-card"
        *ngFor="let t of treatments"
        [routerLink]="t.route"
        (click)="setActiveTab('behandlungen')"
      >
        <div class="card-image" [style.backgroundImage]="'url(' + t.image + ')'">
          <div class="image-overlay"></div>
          <div class="card-title">{{ t.title }}</div>
        </div>
        <div class="card-desc">{{ t.description }}</div>
      </a>
    </div>
  </div>
</div>
