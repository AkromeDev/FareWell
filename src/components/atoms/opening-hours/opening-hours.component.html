<section class="opening-hours" appReveal="up">
  <!-- <h2 class="title">Öffnungszeiten</h2> -->
  <ul class="hours-list">
    <li *ngFor="let entry of openingHours" class="day-entry">
      <span class="day">{{ entry.day }}</span>
      <span class="time" [class.closed]="entry.closed">{{ entry.hours }}</span>
    </li>
  </ul>
</section>
