<div class="footer-section">
  <div class="footer-primary">
    <h2 class="back-to-top">
      <a [appScrollTo]="'topSection'" class="footer-action no-underline"
        ><span class="lang de">Zurück nach oben</span><span class="lang en">Back to top</span></a
      >
    </h2>

    <div class="social-buttons">
      <a
        href="https://www.facebook.com/share/14PfPkcmpKs/?mibextid=wwXIfr"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Facebook"
      >
        <img
          src="assets/images/icons/facebook.svg"
          alt=""
          width="40"
          height="40"
          loading="lazy"
          decoding="async"
          aria-hidden="true"
        />
      </a>

      <a
        href="https://www.instagram.com/farewell.salon/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Instagram"
      >
        <img
          src="assets/images/icons/insta.svg"
          alt=""
          width="40"
          height="40"
          loading="lazy"
          decoding="async"
          aria-hidden="true"
        />
      </a>

      <a
        href="https://www.linkedin.com/company/farewell-gmbh/about/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="LinkedIn"
      >
        <img
          src="assets/images/icons/linkedin.svg"
          alt=""
          width="40"
          height="40"
          loading="lazy"
          decoding="async"
          aria-hidden="true"
        />
      </a>
    </div>

    <h3 class="footer-booking">
      <a
        href="https://salonkee.de/salon/farewell?lang=de"
        target="_blank"
        rel="noopener noreferrer"
        class="footer-action no-underline"
        (click)="trackBookingClick($event)"
      >
        <span class="lang de">TERMIN BUCHEN</span><span class="lang en">BOOK NOW</span>
      </a>
    </h3>
  </div>

  <div class="footer-content">
    <div class="column contact">
      <p><strong>FareWell</strong></p>
      <p>
        <a
          href="https://g.co/kgs/ycCwT2s"
          target="_blank"

        >
          Frauentorgraben 5<br />
          90443 Nürnberg
        </a>
      </p>
      <p><a href="tel:+4915757995694">tel: +49 157 5799 5694</a></p>
      <p><a href="mailto:info@farewell.salon">FareWellGmbH&#64;gmail.com</a></p>
      <p>
        <a [routerLink]="['/karriere/masseur-nuernberg']"

    <div class="column links">
      <a [routerLink]="['/faq']"
        ><span class="lang de">FAQ &amp; Ratgeber</span><span class="lang en">FAQ &amp; guides</span></a
      >
      <a [routerLink]="['/impressum']"
        ><span class="lang de">Impressum</span><span class="lang en">Imprint</span></a
      >
      <a [routerLink]="['/datenschutz']"

      <a [routerLink]="['/agb']"
        ><span class="lang de">AGB</span><span class="lang en">Terms</span></a
      >
    </div>
  </div>
