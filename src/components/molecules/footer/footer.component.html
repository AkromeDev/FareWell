<footer class="footer-section">
  <div class="footer-inner">
    <div class="footer-left">
      <p class="footer-brand">FareWell<span class="brand-dot">.</span></p>

      <a
        href="https://salonkee.de/salon/farewell?lang=de"
        target="_blank"
        rel="noopener noreferrer"
        class="booking-pill no-underline"
        (click)="trackBookingClick($event)"
      >
        <span class="lang de">Termin buchen</span><span class="lang en">Book now</span>
      </a>
    </div>

    <div class="social-buttons">
      <a
        href="https://www.facebook.com/share/14PfPkcmpKs/?mibextid=wwXIfr"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Facebook"
        class="no-underline"
      >
        <img
          src="assets/images/icons/facebook.svg"
          alt=""
          width="32"
          height="32"
          loading="lazy"
          decoding="async"
          aria-hidden="true"
        />
      </a>

      <a
        href="https://www.instagram.com/farewell.salon/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Instagram"
        class="no-underline"
      >
        <img
          src="assets/images/icons/insta.svg"
          alt=""
          width="32"
          height="32"
          loading="lazy"
          decoding="async"
          aria-hidden="true"
        />
      </a>

      <a
        href="https://www.linkedin.com/company/farewell-gmbh/about/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="LinkedIn"
        class="no-underline"
      >
        <img
          src="assets/images/icons/linkedin.svg"
          alt=""
          width="32"
          height="32"
          loading="lazy"
          decoding="async"
          aria-hidden="true"
        />
      </a>
    </div>

    <div class="footer-links">
      <div class="links-row contact-row">
        <a
          href="https://g.co/kgs/ycCwT2s"
          target="_blank"
          rel="noopener noreferrer"
          class="no-underline"
          [attr.aria-label]="t('Öffnet Google Maps in einem neuen Tab oder in der App', 'Opens Google Maps in a new tab or in the app')"
        >
          Frauentorgraben 5, 90443 Nürnberg
        </a>
        <a href="tel:+4915757995694" class="no-underline">tel: +49 157 5799 5694</a>
        <a href="mailto:info@farewell.salon" class="no-underline">info&#64;farewell.salon</a>
        <a [routerLink]="p('/karriere/masseur-nuernberg')" class="no-underline"
          ><span class="lang de">Karriere bei FareWell: Masseur:in</span
          ><span class="lang en">Careers at FareWell: massage therapist</span></a
        >
      </div>

      <div class="links-row legal-row">
        <a [routerLink]="p('/faq')" class="no-underline"
          ><span class="lang de">FAQ &amp; Ratgeber</span><span class="lang en">FAQ &amp; guides</span></a
        >
        <a [routerLink]="p('/impressum')" class="no-underline"
          ><span class="lang de">Impressum</span><span class="lang en">Imprint</span></a
        >
        <a [routerLink]="p('/datenschutz')" class="no-underline"
          ><span class="lang de">Datenschutz</span><span class="lang en">Privacy</span></a
        >
        <a [routerLink]="p('/agb')" class="no-underline"
          ><span class="lang de">AGB</span><span class="lang en">Terms</span></a
        >
        <a href="#topSection" [appScrollTo]="'topSection'" class="no-underline back-to-top"
          ><span class="lang de">Zurück nach oben</span><span class="lang en">Back to top</span></a
        >
      </div>
    </div>
  </div>
</footer>
