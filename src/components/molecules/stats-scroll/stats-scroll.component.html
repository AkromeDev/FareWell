<section class="stats-scroll" [class.stats-scroll--dark]="theme === 'dark'" #section>
  <div class="stats-scroll__sticky" #sticky>
    <canvas class="stats-scroll__grid" #gridCanvas aria-hidden="true"></canvas>

    <div class="stats-scroll__head">
      @if (title) {
        <app-title
          [color]="'dark'"
          [align]="'center'"
          [level]="'h2'"
          [type]="'simple'"
          [title]="title">
        </app-title>
        <app-separator [color]="'dark'" [align]="'center'"></app-separator>
      } @else {
        <ng-content select="[statsScrollHead]"></ng-content>
      }
    </div>

    <div class="stats-scroll__row">
      @for (item of items; track $index) {
        <div class="stats-scroll__item" [ngClass]="'is-' + item.color">
          <div class="stats-scroll__circle" #circle>
            <div class="stats-scroll__bubble">
              <p class="stats-scroll__value">{{ item.value }}</p>
              <p class="stats-scroll__caption">{{ item.caption }}</p>
            </div>
          </div>
          <div class="stats-scroll__trail" #trail aria-hidden="true"></div>
        </div>
      }
    </div>
  </div>
</section>
