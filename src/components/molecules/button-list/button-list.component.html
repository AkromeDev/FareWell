<div class="button-list">
  <app-button
    *ngFor="let btn of buttons; trackBy: trackByLabel"
    [link]="btn.link"
    [theme]="btn.theme"
    [external]="isExternal(btn.link, btn.external)"
    [analyticsEvent]="btn.analyticsEvent"
    [analyticsLocation]="btn.analyticsLocation"
    [analyticsLabel]="btn.analyticsLabel"
  >
    {{ btn.label }}
  </app-button>
</div>
